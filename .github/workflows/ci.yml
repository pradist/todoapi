name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

      - name: Test
        env:
          TEST_SIGN: ${{ secrets.TEST_SIGN }}
          TEST_FAKE_RS256_TOKEN: ${{ secrets.TEST_FAKE_RS256_TOKEN }}
        run: go test ./... -coverprofile=coverage.out

      - name: Coverage report
        run: |
          grep -v "main.go" coverage.out > coverage_filtered.out
          go tool cover -func=coverage_filtered.out | tail -5
